name: README Screenshot Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: readme-screenshot-sync-main
  cancel-in-progress: true

jobs:
  sync-main:
    name: Sync README Screenshot (Direct Push)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      PAGES_BASE_MODE: root
      BASE_PATH: ""
      REPO_NAME_OVERRIDE: ""
    outputs:
      push_result: ${{ steps.publish.outputs.push_result }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve deterministic build timestamp
        id: build_timestamp
        shell: bash
        run: |
          echo "value=$(git show -s --format=%cI "$GITHUB_SHA")" >> "$GITHUB_OUTPUT"

      - name: Validate screenshot base environment
        shell: bash
        run: |
          set -euo pipefail
          if [ "${PAGES_BASE_MODE:-}" != "root" ]; then
            echo "::error::PAGES_BASE_MODE must be 'root' for README screenshot workflow."
            exit 1
          fi
          if [ -n "${BASE_PATH:-}" ]; then
            echo "::error::BASE_PATH must be empty for README screenshot workflow."
            exit 1
          fi
          if [ -n "${REPO_NAME_OVERRIDE:-}" ]; then
            echo "::error::REPO_NAME_OVERRIDE must be empty for README screenshot workflow."
            exit 1
          fi

      - name: Build site
        env:
          OPENLINKS_BUILD_TIMESTAMP: ${{ steps.build_timestamp.outputs.value }}
        run: bun run build

      - name: Install Playwright Chromium
        run: npx --yes playwright@1.52.0 install --with-deps chromium

      - name: Start preview server
        id: preview
        shell: bash
        run: |
          set -euo pipefail
          bun run preview --host 127.0.0.1 --port 4173 --strictPort > /tmp/openlinks-preview.log 2>&1 &
          echo "pid=$!" >> "$GITHUB_OUTPUT"

      - name: Wait for preview readiness
        shell: bash
        run: |
          set -euo pipefail
          for _ in {1..60}; do
            if curl --silent --show-error --fail http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done

          echo "::error::Preview server did not become ready within 60 seconds."
          echo "::group::Preview log"
          cat /tmp/openlinks-preview.log
          echo "::endgroup::"
          exit 1

      - name: Capture README screenshot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/assets

          script_src="$(sed -n 's|.*<script type=\"module\" crossorigin src=\"\([^\"]*\)\".*|\1|p' dist/index.html | head -n 1)"
          if [ -z "$script_src" ]; then
            echo "::error::Unable to resolve script src from dist/index.html."
            sed -n '1,120p' dist/index.html
            exit 1
          fi

          capture_path="/"
          if [[ "$script_src" == */assets/* ]]; then
            maybe_prefix="${script_src%%/assets/*}"
            if [ -n "$maybe_prefix" ] && [ "$maybe_prefix" != "$script_src" ]; then
              capture_path="${maybe_prefix}/"
            fi
          fi

          capture_url="http://127.0.0.1:4173${capture_path}"
          asset_url="http://127.0.0.1:4173${script_src}"
          echo "Resolved capture_url=${capture_url}"
          echo "Resolved asset_url=${asset_url}"

          ready=false
          for _ in {1..60}; do
            if curl --silent --show-error --fail "$capture_url" > /dev/null && \
               curl --silent --show-error --fail "$asset_url" > /dev/null; then
              ready=true
              break
            fi
            sleep 1
          done

          if [ "$ready" != "true" ]; then
            echo "::error::Preview did not become ready with matching HTML and asset URLs."
            echo "::group::dist/index.html"
            sed -n '1,160p' dist/index.html
            echo "::endgroup::"
            echo "::group::Preview log"
            cat /tmp/openlinks-preview.log
            echo "::endgroup::"
            echo "::group::Root HTML (first 120 lines)"
            curl --silent "http://127.0.0.1:4173/" | sed -n '1,120p'
            echo "::endgroup::"
            echo "::group::Capture URL HTML (first 120 lines)"
            curl --silent "$capture_url" | sed -n '1,120p'
            echo "::endgroup::"
            exit 1
          fi

          npx --yes playwright@1.52.0 screenshot --device="Desktop Chrome" \
            --timeout=120000 \
            --wait-for-selector=".profile-header" \
            --wait-for-timeout=1200 \
            "$capture_url" \
            docs/assets/openlinks-preview.png

          bytes="$(wc -c < docs/assets/openlinks-preview.png)"
          if [ "$bytes" -lt 20000 ]; then
            echo "::error::Captured screenshot is unexpectedly small (${bytes} bytes)."
            exit 1
          fi

      - name: Update README screenshot block
        run: bun scripts/ci/upsert-readme-screenshot.ts

      - name: Stop preview server
        if: always() && steps.preview.outputs.pid != ''
        shell: bash
        run: |
          kill "${{ steps.preview.outputs.pid }}" 2>/dev/null || true

      - name: Publish changes
        id: publish
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md docs/assets/openlinks-preview.png

          if git diff --cached --quiet; then
            echo "push_result=no_changes" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "docs(readme): refresh OpenLinks screenshot"

          if git push origin HEAD:main; then
            echo "push_result=pushed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "push_result=blocked" >> "$GITHUB_OUTPUT"

      - name: Publish summary
        if: always()
        run: |
          {
            echo "## README Screenshot Sync"
            echo "- Result: \`${{ steps.publish.outputs.push_result || 'unknown' }}\`"
            echo "- Files in scope:"
            echo "  - \`README.md\`"
            echo "  - \`docs/assets/openlinks-preview.png\`"
          } >> "$GITHUB_STEP_SUMMARY"

  fallback-pr:
    name: Sync README Screenshot (Fallback PR)
    runs-on: ubuntu-latest
    needs:
      - sync-main
    if: needs.sync-main.outputs.push_result == 'blocked'
    env:
      PAGES_BASE_MODE: root
      BASE_PATH: ""
      REPO_NAME_OVERRIDE: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve deterministic build timestamp
        id: build_timestamp
        shell: bash
        run: |
          echo "value=$(git show -s --format=%cI "$GITHUB_SHA")" >> "$GITHUB_OUTPUT"

      - name: Validate screenshot base environment
        shell: bash
        run: |
          set -euo pipefail
          if [ "${PAGES_BASE_MODE:-}" != "root" ]; then
            echo "::error::PAGES_BASE_MODE must be 'root' for README screenshot workflow."
            exit 1
          fi
          if [ -n "${BASE_PATH:-}" ]; then
            echo "::error::BASE_PATH must be empty for README screenshot workflow."
            exit 1
          fi
          if [ -n "${REPO_NAME_OVERRIDE:-}" ]; then
            echo "::error::REPO_NAME_OVERRIDE must be empty for README screenshot workflow."
            exit 1
          fi

      - name: Build site
        env:
          OPENLINKS_BUILD_TIMESTAMP: ${{ steps.build_timestamp.outputs.value }}
        run: bun run build

      - name: Install Playwright Chromium
        run: npx --yes playwright@1.52.0 install --with-deps chromium

      - name: Start preview server
        id: preview
        shell: bash
        run: |
          set -euo pipefail
          bun run preview --host 127.0.0.1 --port 4173 --strictPort > /tmp/openlinks-preview.log 2>&1 &
          echo "pid=$!" >> "$GITHUB_OUTPUT"

      - name: Wait for preview readiness
        shell: bash
        run: |
          set -euo pipefail
          for _ in {1..60}; do
            if curl --silent --show-error --fail http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done

          echo "::error::Preview server did not become ready within 60 seconds."
          echo "::group::Preview log"
          cat /tmp/openlinks-preview.log
          echo "::endgroup::"
          exit 1

      - name: Capture README screenshot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/assets

          script_src="$(sed -n 's|.*<script type=\"module\" crossorigin src=\"\([^\"]*\)\".*|\1|p' dist/index.html | head -n 1)"
          if [ -z "$script_src" ]; then
            echo "::error::Unable to resolve script src from dist/index.html."
            sed -n '1,120p' dist/index.html
            exit 1
          fi

          capture_path="/"
          if [[ "$script_src" == */assets/* ]]; then
            maybe_prefix="${script_src%%/assets/*}"
            if [ -n "$maybe_prefix" ] && [ "$maybe_prefix" != "$script_src" ]; then
              capture_path="${maybe_prefix}/"
            fi
          fi

          capture_url="http://127.0.0.1:4173${capture_path}"
          asset_url="http://127.0.0.1:4173${script_src}"
          echo "Resolved capture_url=${capture_url}"
          echo "Resolved asset_url=${asset_url}"

          ready=false
          for _ in {1..60}; do
            if curl --silent --show-error --fail "$capture_url" > /dev/null && \
               curl --silent --show-error --fail "$asset_url" > /dev/null; then
              ready=true
              break
            fi
            sleep 1
          done

          if [ "$ready" != "true" ]; then
            echo "::error::Preview did not become ready with matching HTML and asset URLs."
            echo "::group::dist/index.html"
            sed -n '1,160p' dist/index.html
            echo "::endgroup::"
            echo "::group::Preview log"
            cat /tmp/openlinks-preview.log
            echo "::endgroup::"
            echo "::group::Root HTML (first 120 lines)"
            curl --silent "http://127.0.0.1:4173/" | sed -n '1,120p'
            echo "::endgroup::"
            echo "::group::Capture URL HTML (first 120 lines)"
            curl --silent "$capture_url" | sed -n '1,120p'
            echo "::endgroup::"
            exit 1
          fi

          npx --yes playwright@1.52.0 screenshot --device="Desktop Chrome" \
            --timeout=120000 \
            --wait-for-selector=".profile-header" \
            --wait-for-timeout=1200 \
            "$capture_url" \
            docs/assets/openlinks-preview.png

          bytes="$(wc -c < docs/assets/openlinks-preview.png)"
          if [ "$bytes" -lt 20000 ]; then
            echo "::error::Captured screenshot is unexpectedly small (${bytes} bytes)."
            exit 1
          fi

      - name: Update README screenshot block
        run: bun scripts/ci/upsert-readme-screenshot.ts

      - name: Stop preview server
        if: always() && steps.preview.outputs.pid != ''
        shell: bash
        run: |
          kill "${{ steps.preview.outputs.pid }}" 2>/dev/null || true

      - name: Check for changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          git add README.md docs/assets/openlinks-preview.png
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create fallback PR
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/readme-screenshot-sync
          delete-branch: false
          commit-message: "docs(readme): refresh OpenLinks screenshot"
          title: "docs(readme): refresh OpenLinks screenshot"
          body: |
            Automated fallback PR for README screenshot sync.

            Direct push to `main` was blocked (likely branch protection), so this workflow opened or updated this PR instead.

            Updated files:
            - `README.md`
            - `docs/assets/openlinks-preview.png`
          add-paths: |
            README.md
            docs/assets/openlinks-preview.png
