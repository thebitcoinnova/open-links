name: README Screenshot Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: readme-screenshot-sync-main
  cancel-in-progress: true

jobs:
  sync-main:
    name: Sync README Screenshot (Direct Push)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      PAGES_BASE_MODE: root
      BASE_PATH: ""
      REPO_NAME_OVERRIDE: ""
    outputs:
      push_result: ${{ steps.publish.outputs.push_result }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve deterministic build timestamp
        id: build_timestamp
        shell: bash
        run: bash scripts/github-actions/readme-screenshot-sync.sh resolve-build-timestamp

      - name: Validate screenshot base environment
        shell: bash
        run: bash scripts/github-actions/readme-screenshot-sync.sh validate-env

      - name: Build site
        env:
          OPENLINKS_BUILD_TIMESTAMP: ${{ steps.build_timestamp.outputs.value }}
        run: bun run build

      - name: Install Playwright Chromium
        run: npx --yes playwright@1.52.0 install --with-deps chromium

      - name: Start preview server
        id: preview
        shell: bash
        run: bash scripts/github-actions/readme-screenshot-sync.sh start-preview

      - name: Wait for preview readiness
        shell: bash
        run: bash scripts/github-actions/readme-screenshot-sync.sh wait-preview

      - name: Capture README screenshot
        shell: bash
        run: bash scripts/github-actions/readme-screenshot-sync.sh capture-screenshot

      - name: Update README screenshot block
        run: bun scripts/ci/upsert-readme-screenshot.ts

      - name: Stop preview server
        if: always() && steps.preview.outputs.pid != ''
        shell: bash
        env:
          PREVIEW_PID: ${{ steps.preview.outputs.pid }}
        run: bash scripts/github-actions/readme-screenshot-sync.sh stop-preview

      - name: Publish changes
        id: publish
        shell: bash
        run: bash scripts/github-actions/readme-screenshot-sync.sh publish-changes

      - name: Publish summary
        if: always()
        env:
          PUSH_RESULT: ${{ steps.publish.outputs.push_result }}
        run: bash scripts/github-actions/readme-screenshot-sync.sh publish-summary

  fallback-pr:
    name: Sync README Screenshot (Fallback PR)
    runs-on: ubuntu-latest
    needs:
      - sync-main
    if: needs.sync-main.outputs.push_result == 'blocked'
    env:
      PAGES_BASE_MODE: root
      BASE_PATH: ""
      REPO_NAME_OVERRIDE: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve deterministic build timestamp
        id: build_timestamp
        shell: bash
        run: bash scripts/github-actions/readme-screenshot-sync.sh resolve-build-timestamp

      - name: Validate screenshot base environment
        shell: bash
        run: bash scripts/github-actions/readme-screenshot-sync.sh validate-env

      - name: Build site
        env:
          OPENLINKS_BUILD_TIMESTAMP: ${{ steps.build_timestamp.outputs.value }}
        run: bun run build

      - name: Install Playwright Chromium
        run: npx --yes playwright@1.52.0 install --with-deps chromium

      - name: Start preview server
        id: preview
        shell: bash
        run: bash scripts/github-actions/readme-screenshot-sync.sh start-preview

      - name: Wait for preview readiness
        shell: bash
        run: bash scripts/github-actions/readme-screenshot-sync.sh wait-preview

      - name: Capture README screenshot
        shell: bash
        run: bash scripts/github-actions/readme-screenshot-sync.sh capture-screenshot

      - name: Update README screenshot block
        run: bun scripts/ci/upsert-readme-screenshot.ts

      - name: Stop preview server
        if: always() && steps.preview.outputs.pid != ''
        shell: bash
        env:
          PREVIEW_PID: ${{ steps.preview.outputs.pid }}
        run: bash scripts/github-actions/readme-screenshot-sync.sh stop-preview

      - name: Check for changes
        id: changes
        shell: bash
        run: bash scripts/github-actions/readme-screenshot-sync.sh check-changes

      - name: Create fallback PR
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/readme-screenshot-sync
          delete-branch: false
          commit-message: "docs(readme): refresh OpenLinks screenshot"
          title: "docs(readme): refresh OpenLinks screenshot"
          body: |
            Automated fallback PR for README screenshot sync.

            Direct push to `main` was blocked (likely branch protection), so this workflow opened or updated this PR instead.

            Updated files:
            - `README.md`
            - `docs/assets/openlinks-preview.png`
          add-paths: |
            README.md
            docs/assets/openlinks-preview.png
