name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - "**"

permissions:
  contents: read
  pull-requests: write

jobs:
  required-checks:
    name: Required Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect Studio Docker-related changes
        id: studio_docker_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            studio_docker:
              - 'bun.lock'
              - 'package.json'
              - 'packages/**/package.json'
              - 'packages/studio-api/Dockerfile'
              - 'packages/studio-web/Dockerfile'
              - 'packages/studio-worker/Dockerfile'
              - 'docker-compose.studio.yml'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Required checks summary
        run: |
          {
            echo "## CI Required Checks"
            echo "- Event: \`${{ github.event_name }}\`"
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- Studio Docker guard changed-path match: \`${{ steps.studio_docker_changes.outputs.studio_docker }}\`"
            echo "- Commands:"
            echo "  - \`bun run validate:data\`"
            echo "  - \`bun run typecheck\`"
            echo "  - \`bun run build\`"
            echo "  - \`bun run quality:check\`"
            echo "  - \`docker build -f packages/studio-api/Dockerfile .\` (conditional)"
            echo "  - \`docker build -f packages/studio-web/Dockerfile .\` (conditional)"
            echo "  - \`docker build -f packages/studio-worker/Dockerfile .\` (conditional)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run required checks
        id: run_required
        shell: bash
        env:
          STUDIO_DOCKER_CHANGED: ${{ steps.studio_docker_changes.outputs.studio_docker }}
        run: |
          set -o pipefail
          mkdir -p .ci-diagnostics/required

          run_check() {
            local key="$1"
            shift
            local log_file=".ci-diagnostics/required/${key}.log"
            echo "::group::${key}"
            "$@" 2>&1 | tee "$log_file"
            local status=${PIPESTATUS[0]}
            echo "::endgroup::"
            return $status
          }

          failures=()
          run_check "validate_data" bun run validate:data || failures+=("validate:data")
          run_check "typecheck" bun run typecheck || failures+=("typecheck")
          run_check "build" bun run build || failures+=("build")
          run_check "quality_check" bun run quality:check || failures+=("quality:check")

          if [[ "$STUDIO_DOCKER_CHANGED" == "true" ]]; then
            {
              echo "### Studio Docker Guard"
              echo "- Triggered by path changes."
              echo "- Running Studio Docker image builds in required lane."
            } >> "$GITHUB_STEP_SUMMARY"

            run_check "studio_docker_api_build" docker build -f packages/studio-api/Dockerfile . || failures+=("studio:docker:api")
            run_check "studio_docker_web_build" docker build -f packages/studio-web/Dockerfile . || failures+=("studio:docker:web")
            run_check "studio_docker_worker_build" docker build -f packages/studio-worker/Dockerfile . || failures+=("studio:docker:worker")
          else
            {
              echo "### Studio Docker Guard"
              echo "- Skipped by path filter (no Studio Docker/dependency file changes)."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if ((${#failures[@]} > 0)); then
            echo "failures=${failures[*]}" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "failures=none" >> "$GITHUB_OUTPUT"

      - name: Required check failure summary
        if: failure()
        run: |
          {
            echo "### ❌ Required checks failed"
            echo "- Failed commands: \`${{ steps.run_required.outputs.failures }}\`"
            echo "- Review log sections below and use local parity commands to reproduce."
            echo "- Suggested commands:"
            echo "  - \`bun run validate:data\`"
            echo "  - \`bun run typecheck\`"
            echo "  - \`bun run build\`"
            echo "  - \`bun run quality:check\`"
            echo "  - \`docker build -f packages/studio-api/Dockerfile .\`"
            echo "  - \`docker build -f packages/studio-web/Dockerfile .\`"
            echo "  - \`docker build -f packages/studio-worker/Dockerfile .\`"
            echo "- If Docker builds failed with frozen lockfile errors, run \`bun install\` and commit updated \`bun.lock\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Replay required raw logs
        if: failure()
        shell: bash
        run: |
          echo "Replaying required-check logs (raw):"
          for file in .ci-diagnostics/required/*.log; do
            echo "----- ${file} -----"
            cat "$file"
          done

      - name: Upload required diagnostics artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-required
          path: .ci-diagnostics/required
          if-no-files-found: error
          retention-days: 7

      - name: Comment on PR for required-check failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const failed = `${{ steps.run_required.outputs.failures }}` || 'unknown';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '### ❌ OpenLinks CI required checks failed',
              `- Failed commands: \`${failed}\``,
              '- Workflow summary includes remediation steps and raw diagnostics replay.',
              '- Artifact: `ci-diagnostics-required` (uploaded on failure).',
              `- Run details: ${runUrl}`
            ].join('\n');

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

      - name: Upload deployment artifact
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: openlinks-dist
          path: dist
          if-no-files-found: error
          retention-days: 3

      - name: Record deploy handoff contract
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          {
            echo "### Deploy Handoff Artifact"
            echo "- Artifact name: \`openlinks-dist\`"
            echo "- Producer workflow: \`CI\`"
            echo "- Intended consumer: \`Deploy Pages\` workflow"
          } >> "$GITHUB_STEP_SUMMARY"

  strict-signals:
    name: Strict Signals (Non-Blocking)
    runs-on: ubuntu-latest
    needs:
      - required-checks
    if: needs.required-checks.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Strict checks summary
        run: |
          {
            echo "## Strict Signal Lane (Phase 5 Non-Blocking)"
            echo "- Commands:"
            echo "  - \`bun run validate:data:strict\`"
            echo "  - \`bun run build:strict\`"
            echo "  - \`bun run quality:strict\`"
            echo "- Policy: strict failures are warning signals in this phase."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run strict checks
        id: run_strict
        shell: bash
        run: |
          set -o pipefail
          mkdir -p .ci-diagnostics/strict

          run_check() {
            local key="$1"
            shift
            local log_file=".ci-diagnostics/strict/${key}.log"
            echo "::group::${key}"
            "$@" 2>&1 | tee "$log_file"
            local status=${PIPESTATUS[0]}
            echo "::endgroup::"
            return $status
          }

          failures=()
          run_check "validate_data_strict" bun run validate:data:strict || failures+=("validate:data:strict")
          run_check "build_strict" bun run build:strict || failures+=("build:strict")
          run_check "quality_strict" bun run quality:strict || failures+=("quality:strict")

          if ((${#failures[@]} > 0)); then
            echo "failures=${failures[*]}" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "failures=none" >> "$GITHUB_OUTPUT"

      - name: Report strict warning signal
        if: steps.run_strict.outcome == 'failure'
        run: |
          {
            echo "### ⚠ Strict checks reported failures (non-blocking)"
            echo "- Failed strict commands: \`${{ steps.run_strict.outputs.failures }}\`"
            echo "- Required checks passed, so this does not block merge/deploy in Phase 5."
            echo "- Address strict diagnostics before advancing quality gates."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Replay strict raw logs
        if: steps.run_strict.outcome == 'failure'
        shell: bash
        run: |
          echo "Replaying strict-check logs (raw):"
          for file in .ci-diagnostics/strict/*.log; do
            echo "----- ${file} -----"
            cat "$file"
          done

      - name: Upload strict diagnostics artifact
        if: steps.run_strict.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-strict
          path: .ci-diagnostics/strict
          if-no-files-found: error
          retention-days: 7

      - name: Comment on PR for strict warning signal
        if: steps.run_strict.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const failed = `${{ steps.run_strict.outputs.failures }}` || 'unknown';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '### ⚠ OpenLinks strict checks failed (non-blocking in Phase 5)',
              `- Failed commands: \`${failed}\``,
              '- Required checks passed; this signal does not block merge/deploy in this phase.',
              '- Artifact: `ci-diagnostics-strict` (uploaded on strict failure).',
              `- Run details: ${runUrl}`
            ].join('\n');

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
