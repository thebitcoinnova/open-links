name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  required-checks:
    name: Required Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Required checks summary
        run: |
          {
            echo "## CI Required Checks"
            echo "- Event: \`${{ github.event_name }}\`"
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- Commands:"
            echo "  - \`npm run validate:data\`"
            echo "  - \`npm run typecheck\`"
            echo "  - \`npm run build\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run required checks
        run: npm run ci:required

      - name: Upload deployment artifact
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: openlinks-dist
          path: dist
          if-no-files-found: error
          retention-days: 3

  strict-signals:
    name: Strict Signals (Non-Blocking)
    runs-on: ubuntu-latest
    needs:
      - required-checks
    if: needs.required-checks.result == 'success'
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Strict checks summary
        run: |
          {
            echo "## Strict Signal Lane (Phase 4 Non-Blocking)"
            echo "- Commands:"
            echo "  - \`npm run validate:data:strict\`"
            echo "  - \`npm run build:strict\`"
            echo "- Policy: strict failures are warning signals in this phase."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run strict checks
        run: npm run ci:strict

      - name: Report strict warning signal
        if: failure()
        run: |
          {
            echo "### ⚠ Strict checks reported failures (non-blocking)"
            echo "- Required checks already passed."
            echo "- Address strict diagnostics before Phase 5 hardening."
          } >> "$GITHUB_STEP_SUMMARY"
