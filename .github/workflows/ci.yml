name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - "**"

permissions:
  contents: read
  pull-requests: write

jobs:
  required-checks:
    name: Required Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect Studio Docker-related changes
        id: studio_docker_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            studio_docker:
              - 'bun.lock'
              - 'package.json'
              - 'packages/**/package.json'
              - 'packages/studio-api/Dockerfile'
              - 'packages/studio-web/Dockerfile'
              - 'packages/studio-worker/Dockerfile'
              - 'docker-compose.studio.yml'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Required checks summary
        env:
          STUDIO_DOCKER_CHANGED: ${{ steps.studio_docker_changes.outputs.studio_docker }}
        run: bash scripts/github-actions/ci.sh required-summary

      - name: Run required checks
        id: run_required
        shell: bash
        env:
          STUDIO_DOCKER_CHANGED: ${{ steps.studio_docker_changes.outputs.studio_docker }}
        run: bash scripts/github-actions/ci.sh run-required

      - name: Required check failure summary
        if: failure()
        env:
          FAILED_COMMANDS: ${{ steps.run_required.outputs.failures }}
        run: bash scripts/github-actions/ci.sh required-failure-summary

      - name: Replay required raw logs
        if: failure()
        shell: bash
        run: bash scripts/github-actions/ci.sh replay-logs required

      - name: Upload required diagnostics artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-required
          path: .ci-diagnostics/required
          if-no-files-found: error
          retention-days: 7

      - name: Comment on PR for required-check failure
        if: failure() && github.event_name == 'pull_request'
        env:
          COMMENT_KIND: required
          FAILED_COMMANDS: ${{ steps.run_required.outputs.failures }}
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node scripts/github-actions/comment-pr.mjs

      - name: Build deployment artifacts
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bun run deploy:build

      - name: Upload AWS deployment artifact
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: deploy-aws-site
          path: .artifacts/deploy/aws
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 3

      - name: Upload Pages deployment artifact
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: deploy-pages-site
          path: .artifacts/deploy/github-pages
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 3

      - name: Record deploy handoff contract
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bash scripts/github-actions/ci.sh deploy-handoff-summary

  strict-signals:
    name: Strict Signals (Non-Blocking)
    runs-on: ubuntu-latest
    needs:
      - required-checks
    if: needs.required-checks.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Strict checks summary
        run: bash scripts/github-actions/ci.sh strict-summary

      - name: Run strict checks
        id: run_strict
        shell: bash
        run: bash scripts/github-actions/ci.sh run-strict

      - name: Report strict warning signal
        if: failure() && steps.run_strict.conclusion == 'failure'
        env:
          FAILED_COMMANDS: ${{ steps.run_strict.outputs.failures }}
        run: bash scripts/github-actions/ci.sh strict-warning-summary

      - name: Replay strict raw logs
        if: failure() && steps.run_strict.conclusion == 'failure'
        shell: bash
        run: bash scripts/github-actions/ci.sh replay-logs strict

      - name: Upload strict diagnostics artifact
        if: failure() && steps.run_strict.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-strict
          path: .ci-diagnostics/strict
          if-no-files-found: error
          retention-days: 7

      - name: Comment on PR for strict warning signal
        if: failure() && steps.run_strict.conclusion == 'failure' && github.event_name == 'pull_request'
        env:
          COMMENT_KIND: strict
          FAILED_COMMANDS: ${{ steps.run_strict.outputs.failures }}
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node scripts/github-actions/comment-pr.mjs
