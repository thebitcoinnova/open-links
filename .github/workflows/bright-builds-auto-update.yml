# coding-and-architecture-requirements-managed-file: .github/workflows/bright-builds-auto-update.yml
name: Bright Builds Auto Update

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bright-builds-auto-update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Run Bright Builds auto-update
        run: bash ./scripts/bright-builds-auto-update.sh
