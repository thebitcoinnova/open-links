name: Deploy Production

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: production-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Resolve Deploy Context
    runs-on: ubuntu-latest
    if: |
      (
        github.event_name == 'workflow_dispatch' &&
        github.ref == 'refs/heads/main'
      ) ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    outputs:
      artifact_source: ${{ steps.context.outputs.artifact_source }}
      aws_enabled: ${{ steps.aws.outputs.enabled }}
      aws_target_enabled: ${{ steps.topology.outputs.aws_target_enabled }}
      checkout_ref: ${{ steps.context.outputs.checkout_ref }}
      ci_run_id: ${{ steps.context.outputs.ci_run_id }}
      github_pages_enabled: ${{ steps.topology.outputs.github_pages_enabled }}
      primary_target: ${{ steps.topology.outputs.primary_target }}

    steps:
      - name: Checkout repository helpers
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1

      - name: Resolve source ref and artifact source
        id: context
        shell: bash
        env:
          GITHUB_WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          GITHUB_WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: bash scripts/github-actions/deploy-pages.sh resolve-context

      - name: Resolve enabled deployment targets
        id: topology
        shell: bash
        run: bash scripts/github-actions/deploy-pages.sh resolve-targets

      - name: Resolve AWS deploy opt-in
        id: aws
        shell: bash
        env:
          AWS_TARGET_ENABLED: ${{ steps.topology.outputs.aws_target_enabled }}
          OPENLINKS_ENABLE_AWS_DEPLOY: ${{ vars.OPENLINKS_ENABLE_AWS_DEPLOY }}
        run: bash scripts/github-actions/deploy-pages.sh resolve-aws-opt-in

      - name: Publish deploy context summary
        shell: bash
        env:
          ARTIFACT_SOURCE: ${{ steps.context.outputs.artifact_source }}
          AWS_ENABLED: ${{ steps.aws.outputs.enabled }}
          AWS_TARGET_ENABLED: ${{ steps.topology.outputs.aws_target_enabled }}
          CHECKOUT_REF: ${{ steps.context.outputs.checkout_ref }}
          GITHUB_PAGES_ENABLED: ${{ steps.topology.outputs.github_pages_enabled }}
          PRIMARY_TARGET: ${{ steps.topology.outputs.primary_target }}
        run: bash scripts/github-actions/deploy-pages.sh publish-context-summary

  build_artifacts:
    name: Build Deploy Artifacts
    runs-on: ubuntu-latest
    needs:
      - prepare
    if: needs.prepare.outputs.artifact_source == 'manual-build'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build deploy artifacts
        run: bun run deploy:build

      - name: Upload AWS deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-aws-site
          path: .artifacts/deploy/aws
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload Pages deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-pages-site
          path: .artifacts/deploy/github-pages
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 1

  aws:
    name: Deploy AWS Site
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_artifacts
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.aws_target_enabled == 'true' &&
      needs.prepare.outputs.aws_enabled == 'true' &&
      (
        needs.prepare.outputs.artifact_source == 'ci' ||
        needs.build_artifacts.result == 'success'
      )
    environment:
      name: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download AWS artifact from CI
        if: needs.prepare.outputs.artifact_source == 'ci'
        uses: actions/download-artifact@v5
        with:
          github-token: ${{ github.token }}
          name: deploy-aws-site
          path: .artifacts/deploy/aws
          run-id: ${{ needs.prepare.outputs.ci_run_id }}

      - name: Download AWS artifact from manual build
        if: needs.prepare.outputs.artifact_source == 'manual-build'
        uses: actions/download-artifact@v5
        with:
          name: deploy-aws-site
          path: .artifacts/deploy/aws

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Bootstrap AWS infrastructure
        run: bun run deploy:aws:bootstrap --apply

      - name: Publish AWS artifact
        run: bun run deploy:publish -- --target=aws --artifact=.artifacts/deploy/aws --apply

      - name: Upload AWS deploy diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-production-aws-diagnostics
          path: .codex/logs/deploy
          if-no-files-found: ignore
          retention-days: 7

  pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_artifacts
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.github_pages_enabled == 'true' &&
      (
        needs.prepare.outputs.artifact_source == 'ci' ||
        needs.build_artifacts.result == 'success'
      )
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Pages artifact from CI
        if: needs.prepare.outputs.artifact_source == 'ci'
        uses: actions/download-artifact@v5
        with:
          github-token: ${{ github.token }}
          name: deploy-pages-site
          path: .artifacts/deploy/github-pages
          run-id: ${{ needs.prepare.outputs.ci_run_id }}

      - name: Download Pages artifact from manual build
        if: needs.prepare.outputs.artifact_source == 'manual-build'
        uses: actions/download-artifact@v5
        with:
          name: deploy-pages-site
          path: .artifacts/deploy/github-pages

      - name: Prepare Pages deployment
        id: pages_plan
        run: bun run deploy:publish -- --target=github-pages --artifact=.artifacts/deploy/github-pages

      - name: Archive Pages artifact
        if: steps.pages_plan.outputs.pages_changed == 'true'
        run: bash scripts/ci/archive-pages-artifact.sh .artifacts/deploy/github-pages "$RUNNER_TEMP/pages-artifact.tar"

      - name: Upload Pages deployment artifact
        if: steps.pages_plan.outputs.pages_changed == 'true'
        id: upload_pages_artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ${{ runner.temp }}/pages-artifact.tar
          retention-days: 1
          if-no-files-found: error

      - name: Create Pages deployment
        if: steps.pages_plan.outputs.pages_changed == 'true'
        id: deployment
        env:
          ARTIFACT_ID: ${{ steps.upload_pages_artifact.outputs.artifact-id }}
          GITHUB_TOKEN: ${{ github.token }}
          PAGES_BUILD_VERSION: ${{ needs.prepare.outputs.checkout_ref }}
        run: bun run scripts/ci/create-pages-deployment.ts

      - name: Wait for Pages deployment
        if: steps.pages_plan.outputs.pages_changed == 'true'
        env:
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.deployment_id }}
          EXPECTED_COMMIT_SHA: ${{ needs.prepare.outputs.checkout_ref }}
          EXPECTED_PUBLIC_URL: ${{ steps.deployment.outputs.page_url }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bun run scripts/ci/wait-for-pages-deployment.ts

      - name: Record Pages no-op summary
        if: steps.pages_plan.outputs.pages_changed != 'true'
        shell: bash
        run: bash scripts/github-actions/deploy-pages.sh publish-pages-noop-summary

      - name: Upload Pages deploy diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-production-pages-diagnostics
          path: .codex/logs/deploy
          if-no-files-found: ignore
          retention-days: 7

  verify:
    name: Verify Production Deployment
    runs-on: ubuntu-latest
    needs:
      - prepare
      - aws
      - pages
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      (
        needs.prepare.outputs.aws_target_enabled != 'true' ||
        needs.aws.result == 'success' ||
        needs.aws.result == 'skipped'
      ) &&
      (
        needs.prepare.outputs.github_pages_enabled != 'true' ||
        needs.pages.result == 'success' ||
        needs.pages.result == 'skipped'
      ) &&
      (
        needs.prepare.outputs.aws_enabled == 'true' ||
        needs.prepare.outputs.github_pages_enabled == 'true'
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify enabled deployment targets
        run: bun run deploy:verify

      - name: Upload verification diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-production-verify-diagnostics
          path: .codex/logs/deploy
          if-no-files-found: ignore
          retention-days: 7
