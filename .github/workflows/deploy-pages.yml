name: Deploy Pages

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      base_mode:
        description: "Base path mode (project | root | auto)"
        required: false
        default: project
        type: choice
        options:
          - project
          - root
          - auto
      base_path:
        description: "Optional explicit BASE_PATH override (must start and end with /)"
        required: false
        type: string
      repo_name_override:
        description: "Optional repository name override for project mode"
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Validate deployment configuration
        shell: bash
        env:
          DISPATCH_BASE_PATH: ${{ github.event_name == 'workflow_dispatch' && inputs.base_path || '' }}
          DISPATCH_BASE_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.base_mode || 'project' }}
        run: bash scripts/github-actions/deploy-pages.sh validate-config

      - name: Attempt CI artifact reuse
        id: download_ci_artifact
        if: github.event_name == 'workflow_run'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: openlinks-dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: dist

      - name: Resolve deploy artifact strategy
        id: artifact_strategy
        shell: bash
        run: bash scripts/github-actions/deploy-pages.sh resolve-artifact-strategy

      - name: Capture deploy diagnostics context
        shell: bash
        env:
          ARTIFACT_STRATEGY_REASON: ${{ steps.artifact_strategy.outputs.reason }}
          DISPATCH_BASE_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.base_mode || 'project' }}
          DISPATCH_BASE_PATH: ${{ github.event_name == 'workflow_dispatch' && inputs.base_path || '' }}
          DISPATCH_REPO_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && inputs.repo_name_override || '' }}
          HEAD_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || '' }}
        run: bash scripts/github-actions/deploy-pages.sh capture-context

      - name: Setup Bun
        if: steps.artifact_strategy.outputs.reuse != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        if: steps.artifact_strategy.outputs.reuse != 'true'
        run: bun install --frozen-lockfile

      - name: Build site
        if: steps.artifact_strategy.outputs.reuse != 'true'
        env:
          PAGES_BASE_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.base_mode || 'project' }}
          BASE_PATH: ${{ github.event_name == 'workflow_dispatch' && inputs.base_path || '' }}
          REPO_NAME_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && inputs.repo_name_override || '' }}
        run: bun run build

      - name: Verify deployable artifact
        shell: bash
        run: bash scripts/github-actions/deploy-pages.sh verify-artifact

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Upload deploy diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-pages-diagnostics
          path: .deploy-diagnostics
          if-no-files-found: error
          retention-days: 7

      - name: Deployment remediation summary
        if: failure()
        run: bash scripts/github-actions/deploy-pages.sh failure-summary
