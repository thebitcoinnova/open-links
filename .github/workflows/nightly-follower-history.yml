name: Nightly Follower History

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: nightly-follower-history-main
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    name: Sync Follower History and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install agent-browser binaries
        run: npx --yes agent-browser install

      - name: Refresh committed public metadata cache
        run: bun run enrich:rich:strict:write-cache

      - name: Refresh public audience cache
        run: bun run public:rich:sync -- --allow-failures --summary-json .ci-diagnostics/public-rich-sync-summary.json

      - name: Append follower history snapshots
        run: bash scripts/github-actions/nightly-follower-history.sh append-history

      - name: Build deploy artifacts
        run: bun run deploy:build

      - name: Upload cache revalidation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cache-revalidation-stats
          path: output/cache-revalidation
          if-no-files-found: ignore

      - name: Commit and push follower-history artifacts
        id: publish
        shell: bash
        run: bash scripts/github-actions/nightly-follower-history.sh commit-and-push

      - name: Resolve AWS deploy opt-in
        if: steps.publish.outputs.push_result == 'pushed'
        id: aws_opt_in
        shell: bash
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          OPENLINKS_ENABLE_AWS_DEPLOY: ${{ vars.OPENLINKS_ENABLE_AWS_DEPLOY }}
        run: bash scripts/github-actions/nightly-follower-history.sh resolve-aws-opt-in

      - name: Configure AWS credentials
        if: steps.publish.outputs.push_result == 'pushed' && steps.aws_opt_in.outputs.enabled == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Bootstrap AWS infrastructure
        if: steps.publish.outputs.push_result == 'pushed' && steps.aws_opt_in.outputs.enabled == 'true'
        run: bun run deploy:aws:bootstrap --apply

      - name: Publish AWS artifact
        if: steps.publish.outputs.push_result == 'pushed' && steps.aws_opt_in.outputs.enabled == 'true'
        run: bun run deploy:aws:publish --artifact=.artifacts/deploy/aws --apply

      - name: Plan Pages deployment
        if: steps.publish.outputs.push_result == 'pushed'
        id: pages_plan
        run: bun run deploy:pages:plan --artifact=.artifacts/deploy/github-pages

      - name: Archive Pages artifact
        if: steps.publish.outputs.push_result == 'pushed' && steps.pages_plan.outputs.pages_changed == 'true'
        run: bash scripts/ci/archive-pages-artifact.sh .artifacts/deploy/github-pages "$RUNNER_TEMP/pages-artifact.tar"

      - name: Upload Pages deployment artifact
        if: steps.publish.outputs.push_result == 'pushed' && steps.pages_plan.outputs.pages_changed == 'true'
        id: upload_pages_artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ${{ runner.temp }}/pages-artifact.tar
          retention-days: 1
          if-no-files-found: error

      - name: Create Pages deployment
        if: steps.publish.outputs.push_result == 'pushed' && steps.pages_plan.outputs.pages_changed == 'true'
        id: deployment
        env:
          ARTIFACT_ID: ${{ steps.upload_pages_artifact.outputs.artifact-id }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bun run scripts/ci/create-pages-deployment.ts

      - name: Wait for Pages deployment
        if: steps.publish.outputs.push_result == 'pushed' && steps.pages_plan.outputs.pages_changed == 'true'
        env:
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.deployment_id }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bun run scripts/ci/wait-for-pages-deployment.ts

      - name: Verify canonical AWS site and Pages mirror
        if: steps.publish.outputs.push_result == 'pushed' && steps.aws_opt_in.outputs.enabled == 'true'
        run: bun run deploy:verify

      - name: Upload deploy diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-deploy-diagnostics
          path: .codex/logs/deploy
          if-no-files-found: ignore
          retention-days: 7

      - name: Publish summary
        if: always()
        env:
          AWS_DEPLOY_ENABLED: ${{ steps.aws_opt_in.outputs.enabled || 'false' }}
          AWS_DEPLOYMENT_URL: https://openlinks.us/
          PAGES_DEPLOYMENT_CHANGED: ${{ steps.pages_plan.outputs.pages_changed || 'false' }}
          PAGES_DEPLOYMENT_URL: ${{ steps.deployment.outputs.page_url }}
          PUSH_RESULT: ${{ steps.publish.outputs.push_result }}
        run: node scripts/github-actions/nightly-follower-history-summary.mjs >> "$GITHUB_STEP_SUMMARY"
