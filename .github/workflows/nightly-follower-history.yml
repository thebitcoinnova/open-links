name: Nightly Follower History

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: nightly-follower-history-main
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    name: Sync Follower History and Deploy
    runs-on: ubuntu-latest
    env:
      PAGES_BASE_MODE: project
      BASE_PATH: ""
      REPO_NAME_OVERRIDE: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install agent-browser binaries
        run: npx --yes agent-browser install

      - name: Refresh public audience cache
        run: bun run public:rich:sync

      - name: Append follower history snapshots
        run: bash scripts/github-actions/nightly-follower-history.sh append-history

      - name: Build site
        run: bun run build

      - name: Commit and push follower-history artifacts
        id: publish
        shell: bash
        run: bash scripts/github-actions/nightly-follower-history.sh commit-and-push

      - name: Configure Pages
        if: steps.publish.outputs.push_result == 'pushed'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.publish.outputs.push_result == 'pushed'
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy Pages
        if: steps.publish.outputs.push_result == 'pushed'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish summary
        if: always()
        env:
          DEPLOYMENT_URL: ${{ steps.deployment.outputs.page_url }}
          PUSH_RESULT: ${{ steps.publish.outputs.push_result }}
        run: node scripts/github-actions/nightly-follower-history-summary.mjs >> "$GITHUB_STEP_SUMMARY"
