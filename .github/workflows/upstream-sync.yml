name: Upstream Sync

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: upstream-sync-main
  cancel-in-progress: false

jobs:
  # Fork/downstream automation only; the canonical upstream repo should not sync from itself.
  sync-upstream:
    name: Sync Upstream
    runs-on: ubuntu-latest
    if: github.repository != 'pRizz/open-links'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Configure upstream remote
        shell: bash
        run: bash scripts/github-actions/upstream-sync.sh configure-upstream-remote

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure git identity
        run: bash scripts/github-actions/upstream-sync.sh configure-git-identity

      - name: Sync upstream
        id: sync
        shell: bash
        run: bash scripts/github-actions/upstream-sync.sh run-sync

      - name: Push synced branch
        id: push_sync
        if: steps.sync.outputs.command_status == '0' && steps.sync.outputs.before_sha != steps.sync.outputs.after_sha
        run: git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Dispatch production deploy
        id: dispatch_deploy
        if: steps.sync.outputs.command_status == '0' && steps.sync.outputs.before_sha != steps.sync.outputs.after_sha && steps.push_sync.outcome == 'success'
        shell: bash
        env:
          DEPLOY_WORKFLOW_REF: ${{ github.event.repository.default_branch }}
          DEPLOY_WORKFLOW_REPOSITORY: ${{ github.repository }}
          DEPLOY_WORKFLOW_TOKEN: ${{ github.token }}
        run: bash scripts/github-actions/upstream-sync.sh dispatch-deploy

      - name: Publish sync summary
        if: always()
        env:
          UPSTREAM_SYNC_DEPLOY_DISPATCH_STATUS: ${{ steps.dispatch_deploy.outcome == 'success' && 'requested' || (steps.sync.outputs.command_status == '0' && steps.sync.outputs.before_sha != steps.sync.outputs.after_sha && 'failed') || 'not-needed' }}
          SYNC_COMMAND_STATUS: ${{ steps.sync.outputs.command_status }}
          UPSTREAM_SYNC_RESULT_PATH: ${{ steps.sync.outputs.result_path }}
        run: node scripts/github-actions/upstream-sync-summary.mjs >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on sync conflict or error
        if: steps.sync.outputs.command_status != '0'
        run: exit 1
