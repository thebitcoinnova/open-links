name: Upstream Sync

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: upstream-sync-main
  cancel-in-progress: false

jobs:
  sync-upstream:
    name: Sync Upstream
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Configure upstream remote
        shell: bash
        run: |
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/pRizz/open-links.git
          else
            git remote add upstream https://github.com/pRizz/open-links.git
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync upstream
        id: sync
        shell: bash
        run: |
          mkdir -p .ci-diagnostics
          before_sha="$(git rev-parse HEAD)"
          echo "before_sha=${before_sha}" >>"$GITHUB_OUTPUT"

          set +e
          bun run sync:upstream --json > .ci-diagnostics/upstream-sync.json
          command_status=$?
          set -e

          after_sha="$(git rev-parse HEAD)"
          echo "after_sha=${after_sha}" >>"$GITHUB_OUTPUT"
          echo "command_status=${command_status}" >>"$GITHUB_OUTPUT"

      - name: Publish sync summary
        if: always()
        shell: bash
        run: |
          node <<'EOF' >>"$GITHUB_STEP_SUMMARY"
          const fs = require("node:fs");

          const status = process.env.SYNC_COMMAND_STATUS;
          const resultPath = ".ci-diagnostics/upstream-sync.json";

          if (!fs.existsSync(resultPath)) {
            console.log("## Upstream Sync");
            console.log("");
            console.log(`Command failed before a JSON result was written (exit ${status}).`);
            process.exit(0);
          }

          const result = JSON.parse(fs.readFileSync(resultPath, "utf8"));

          console.log("## Upstream Sync");
          console.log("");
          console.log(`- Status: \`${result.status}\``);
          console.log(`- Message: ${result.message}`);
          console.log(`- Branch changed: \`${String(result.branchChanged)}\``);
          console.log(`- Target branch: \`${result.targetBranch}\``);
          console.log(`- Upstream ref: \`${result.upstreamRef}\``);

          if (Array.isArray(result.sharedConflicts) && result.sharedConflicts.length > 0) {
            console.log(`- Shared conflicts: \`${result.sharedConflicts.join(", ")}\``);
          }

          if (Array.isArray(result.forkOwnedConflicts) && result.forkOwnedConflicts.length > 0) {
            console.log(`- Fork-owned conflicts: \`${result.forkOwnedConflicts.join(", ")}\``);
          }
          EOF
        env:
          SYNC_COMMAND_STATUS: ${{ steps.sync.outputs.command_status }}

      - name: Push synced branch
        if: steps.sync.outputs.command_status == '0' && steps.sync.outputs.before_sha != steps.sync.outputs.after_sha
        run: git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Fail on sync conflict or error
        if: steps.sync.outputs.command_status != '0'
        run: exit 1
