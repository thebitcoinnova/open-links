AWSTemplateFormatVersion: "2010-09-09"
Description: OpenLinks static site hosting on CloudFront with a private S3 origin.

Parameters:
  SiteBucketName:
    Type: String
  PrimaryDomain:
    Type: String
  PrimaryHostedZoneId:
    Type: String
  PriceClass:
    Type: String
    Default: PriceClass_100
    AllowedValues:
      - PriceClass_100
      - PriceClass_200
      - PriceClass_All

Resources:
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref SiteBucketName
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  SiteOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Description: !Sub ${AWS::StackName} private S3 access
        Name: !Sub ${AWS::StackName}-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SiteCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref PrimaryDomain
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref PrimaryDomain
          HostedZoneId: !Ref PrimaryHostedZoneId

  RequestRouterFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub ${AWS::StackName}-request-router
      AutoPublish: true
      FunctionConfig:
        Comment: Pretty URL rewrites for OpenLinks.
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;

          if (!request.uri || request.uri === "/") {
            request.uri = "/index.html";
            return request;
          }

          if (request.uri.endsWith("/")) {
            request.uri = request.uri + "index.html";
            return request;
          }

          var lastSegment = request.uri.substring(request.uri.lastIndexOf("/") + 1);
          if (lastSegment.indexOf(".") === -1) {
            request.uri = request.uri + "/index.html";
          }

          return request;
        }

  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Aliases:
          - !Ref PrimaryDomain
        Comment: !Sub ${AWS::StackName} static site distribution
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt RequestRouterFunction.FunctionMetadata.FunctionARN
          TargetOriginId: site-s3-origin
          ViewerProtocolPolicy: redirect-to-https
        DefaultRootObject: index.html
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        Origins:
          - DomainName: !GetAtt SiteBucket.RegionalDomainName
            Id: site-s3-origin
            OriginAccessControlId: !GetAtt SiteOriginAccessControl.Id
            S3OriginConfig: {}
        PriceClass: !Ref PriceClass
        ViewerCertificate:
          AcmCertificateArn: !Ref SiteCertificate
          MinimumProtocolVersion: TLSv1.2_2021
          SslSupportMethod: sni-only

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${SiteBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution}

  PrimaryDomainARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref PrimaryHostedZoneId
      Name: !Ref PrimaryDomain
      Type: A
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  PrimaryDomainAAAARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref PrimaryHostedZoneId
      Name: !Ref PrimaryDomain
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

Outputs:
  SiteBucketName:
    Value: !Ref SiteBucket
  DistributionId:
    Value: !Ref SiteDistribution
  DistributionDomainName:
    Value: !GetAtt SiteDistribution.DomainName
  SiteUrl:
    Value: !Sub https://${PrimaryDomain}
