services:
  - type: web
    name: open-links
    runtime: static
    buildCommand: bun run deploy:build:render
    staticPublishPath: ./.artifacts/deploy/render
    envVars:
      - key: BUN_VERSION
        value: 1.3.9
    buildFilter:
      paths:
        - data/**
        - public/**
        - schema/**
        - scripts/deploy/**
        - scripts/enrichment/**
        - scripts/lib/**
        - scripts/clean-public-build-artifacts.ts
        - scripts/enrich-rich-links.ts
        - scripts/generate-site-badge.ts
        - scripts/generate-site-social-preview.ts
        - scripts/sync-content-images.ts
        - scripts/sync-profile-avatar.ts
        - scripts/validate-data.ts
        - src/**
        - index.html
        - package.json
        - tsconfig.json
        - vite.config.ts
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
